<!DOCTYPE html>
<html>
<head>
    <title>이메일 인증 중...</title>
</head>
<body>
    <div id="message">인증 처리 중입니다. 잠시만 기다려주세요...</div>

    <script>
        window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const code = params.get('code');
    
        // 디버깅용: 콘솔에서 파라미터가 잘 찍히는지 확인하세요 (F12 누르면 보임)
        console.log("Email:", email, "Code:", code);
    
        if (email && code) {
            fetch('https://pseudomiraculous-shamika-uncoalescent.ngrok-free.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, code: code })
            })
            .then(response => {
                if (response.ok) {
                    document.getElementById('message').innerHTML = "✨ <b>인증 성공!</b> 앱으로 돌아가주세요.";
                } else {
                    document.getElementById('message').innerText = "인증 실패: 만료되었거나 이미 사용된 코드입니다.";
                }
            })
            .catch(err => {
                document.getElementById('message').innerText = "서버 연결 오류(ngrok 상태를 확인하세요).";
            });
        } else {
            document.getElementById('message').innerText = "URL 파라미터 누락 (잘못된 접근입니다).";
        }
    };
    </script>
</body>
</html>
